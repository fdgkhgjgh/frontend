<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Forum</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style.css" id="theme-stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>


    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7272953978621575"
     crossorigin="anonymous"></script>
</head>
<body>
    <header>
    <div style="display:flex; align-items:center; justify-content:center; gap:12px;">
        <h1>Miniless 物语</h1>
    </div>
    <nav>
        <button id="theme-toggle">🌙/☀️模式</button>
        <a href="register.html">注册账号(Register)</a>
        <a href="login.html">登录(Login)</a>
        <button id="logout-button" style="display: none;">Logout</button>
    </nav>
</header>
    <div style="display:flex; align-items:center; justify-content:space-between; padding: 4px 8px;">
    <!-- Left: Create Post button -->
    <button onclick="togglePostModal()" id="create-post-btn" style="
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #1da1f2;
        color: white;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        font-size: 1.9rem;
        font-weight: 200;
        cursor: pointer;
        line-height: 1;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    ">+</button>

    <!-- Right: DM button -->
    <div style="position: relative;">
        <button onclick="toggleDMPanel()" id="dm-btn" style="
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #4f46e5;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        ">✉</button>
        <span id="dm-unread-badge" style="
            display: none;
            position: absolute;
            top: -4px;
            right: -4px;
            background: red;
            color: white;
            border-radius: 50%;
            font-size: 0.65rem;
            width: 16px;
            height: 16px;
            line-height: 16px;
            text-align: center;
            font-weight: bold;
        ">0</span>
    </div>
</div>
    <main id="post-list" class="main-post-list">
        <!-- Posts will be dynamically inserted here -->
  </main>
    <!-- Pagination container will be inserted here by js -->
    <!-- Map Panel (hidden by default) -->
    <div style="position: relative;">
<!-- Map Panel (hidden by default) -->
<div id="map-panel" style="
    display: none;
    flex-direction: column;
    gap: 0;
    margin: 0 8px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    position: absolute;
    left: 8px;
    right: 8px;
    z-index: 500;
    bottom: 60px;
">
    <!-- Map -->
    <div style="position: relative;">
        <div id="map-container" style="width: 100%; height: 350px;"></div>
        <button id="share-location-btn" onclick="toggleLocationSharing()" style="
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(79, 70, 229, 0.5);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: background 0.3s;
        " onmouseenter="this.style.background='rgba(79,70,229,1)'"
           onmouseleave="this.style.background='rgba(79,70,229,0.5)'"
           ontouchstart="this.style.background='rgba(79,70,229,1)'"
           ontouchend="this.style.background='rgba(79,70,229,0.5)'">
            📍分享我的位置Share My Location
        </button>
        <button id="toggle-tracks-btn" onclick="toggleTracks()" style="
            position: absolute;
            bottom: 12px;
            left: 10px;
            z-index: 1000;
            background: rgba(45, 125, 70, 0.5);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: background 0.3s;
        " onmouseenter="this.style.background='rgba(45,125,70,1)'"
           onmouseleave="this.style.background='rgba(45,125,70,0.5)'"
           ontouchstart="this.style.background='rgba(45,125,70,1)'"
           ontouchend="this.style.background='rgba(45,125,70,0.5)'">
            轨迹Tracks
        </button>
    </div>

    <!-- Chat Panel -->
    <div style="
        background: #f9f9f9;
        border-top: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        height: 220px;
    ">
        <div style="padding: 8px 12px; font-weight: bold; font-size: 0.85rem; border-bottom: 1px solid #eee; background: #fff;">
            👥群聊天
        </div>
        <div id="chat-messages" style="
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            font-size: 0.85rem;
        "></div>
        <div style="
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            border-top: 1px solid #eee;
            background: #fff;
        ">
            <button onclick="sendChatMessage()" style="
                background: #1da1f2;
                color: white;
                border: none;
                padding: 6px 14px;
                border-radius: 20px;
                cursor: pointer;
                font-size: 0.85rem;
                flex-shrink: 0;
            ">发送</button>
            <input id="chat-input" type="text" placeholder="Type a message..."
                onkeydown="if(event.key==='Enter') sendChatMessage()"
                style="
                    flex: 1;
                    padding: 6px 10px;
                    border: 1px solid #ddd;
                    border-radius: 20px;
                    font-size: 0.85rem;
                    outline: none;
                    min-width: 0;
                "/>
        </div>
    </div>
</div>  <!-- ✅ closes map-panel -->

<!-- Map Toggle Button — OUTSIDE and AFTER map panel -->
<div style="text-align: center; margin: 16px 0;">
    <button id="map-toggle-btn" onclick="toggleMapPanel()" style="
        background: #1da1f2;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 20px;
        font-size: 1rem;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    ">🗺️家庭地图 Family Map</button>
</div>
    </div>

<!-- Map Panel Script -->
<script src="js/map-panel.js"></script>
       <!-- Create Post Modal -->
<div id="create-post-modal" style="
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    justify-content: center;
    align-items: center;
">
    <div style="
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        width: 90%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
    ">
        <button onclick="togglePostModal()" style="
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #666;
        ">✕</button>
        <h2 style="margin: 0 0 16px 0;">创建新帖子</h2>
        <form id="create-post-form-main">
            <label for="title-main">标题:</label>
            <input type="text" id="title-main" name="title" required style="width:100%; margin-bottom:12px;"><br>

            <label for="content-main">描述:</label>
            <textarea id="content-main" name="content" rows="4" style="width:100%; margin-bottom:12px;"></textarea><br>

            <label for="file-main">照片或视频(可多选):</label>
            <input type="file" id="file-main" name="files" accept="image/*, video/*" multiple style="margin-bottom:12px;"><br>

            <button type="submit" id="create-post-button" style="
                background: #1da1f2;
                color: white;
                border: none;
                padding: 10px 24px;
                border-radius: 20px;
                cursor: pointer;
                font-size: 1rem;
                width: 100%;
            ">
                发送新帖子(Send New Post)
                <span id="button-spinner" style="display: none;">&#x21bb;</span>
                <span id="button-success-icon" style="display: none;">&#x2713;</span>
            </button>
        </form>
        <p id="create-post-message-main"></p>
    </div>
</div>
    <!-- DM Panel -->
<div id="dm-panel" style="
    display: none;
    position: fixed;
    top: 0;
    right: 0;
    width: 300px;
    height: 100vh;
    background: #fff;
    box-shadow: -4px 0 16px rgba(0,0,0,0.2);
    z-index: 99998;
    flex-direction: column;
    transition: transform 0.3s;
">
    <!-- Header -->
    <div style="
        padding: 12px 16px;
        background: #4f46e5;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
    ">
        <span style="font-weight:bold;">💬 Messages</span>
        <button onclick="toggleDMPanel()" style="
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        ">✕</button>
    </div>

    <!-- User list / Chat area -->
    <div id="dm-content" style="flex:1; overflow-y:auto; display:flex; flex-direction:column;">
        <!-- User list shown by default -->
        <div id="dm-user-list" style="padding:8px;">
            <p style="color:#888; font-size:0.85rem; padding:8px;">Loading users...</p>
        </div>

        <!-- Chat window (hidden until user selected) -->
        <div id="dm-chat-window" style="display:none; flex-direction:column; height:100%;">
            <div id="dm-chat-header" style="
                padding: 8px 12px;
                background: #f0f0f0;
                display: flex;
                align-items: center;
                gap: 8px;
                border-bottom: 1px solid #ddd;
            ">
                <button onclick="showDMUserList()" style="
                    background: none;
                    border: none;
                    cursor: pointer;
                    font-size: 1rem;
                ">←</button>
                <span id="dm-chat-username" style="font-weight:bold;"></span>
            </div>
            <div id="dm-messages" style="
                flex:1;
                overflow-y:auto;
                padding:10px;
                font-size:0.85rem;
                min-height:0;
                max-height: calc(100vh - 160px);
            "></div>
            <div style="
                display:flex;
                gap:6px;
                padding:8px;
                border-top:1px solid #ddd;
            ">
                <button onclick="sendDM()" style="
                    background:#4f46e5;
                    color:white;
                    border:none;
                    padding:6px 12px;
                    border-radius:16px;
                    cursor:pointer;
                    font-size:0.85rem;
                    flex-shrink:0;
                ">Send</button>
                <input id="dm-input" type="text" placeholder="Type a message..."
                    onkeydown="if(event.key==='Enter') sendDM()"
                    style="
                        flex:1;
                        padding:6px 10px;
                        border:1px solid #ddd;
                        border-radius:16px;
                        font-size:0.85rem;
                        outline:none;
                        min-width:0;
                    "/>
            </div>
        </div>
    </div>
</div>

<!-- DM overlay -->
<div id="dm-overlay" onclick="toggleDMPanel()" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100vw; height:100vh;
    background:rgba(0,0,0,0.3);
    z-index:99997;
"></div>
    <!-- 1. config.js (for API_BASE_URL) -->
    <script src="js/config.js" type="module"></script>
    <!-- 2. utils.js (for formatDate, or other utilities) -->
    <script src="js/utils.js" type="module"></script>
    <!-- 3. auth.js (for checkLoginStatus, login, register, logout) -->
    <script src="js/auth.js" type="module"></script>
    <!-- 4. app.js (for main application logic, depends on auth.js)-->
    <script src="js/app.js" type="module"></script>
     <!-- 5. theme-toggle.js (can be anywhere, but usually best after main logic) -->
    <script src="js/theme-toggle.js" type="module"></script>

    <div id="search-container" style="
    display: flex;
    gap: 8px;
    margin: 10px 8px;
    align-items: center;
">
    <button onclick="searchPosts()" style="
        background: #1da1f2;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.9rem;
        white-space: nowrap;
        flex-shrink: 0;
    ">搜索</button>
    <button onclick="clearSearch()" id="clear-search-btn" style="
        display: none;
        background: #aaa;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.9rem;
        flex-shrink: 0;
    ">清除✕</button>
    <input id="search-input" type="text" placeholder="搜索帖子Search posts,..."
        style="
            flex: 1;
            padding: 8px 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 0.9rem;
            outline: none;
        "
        onkeydown="if(event.key==='Enter') searchPosts()"
    />
</div>
    <footer class="site-footer">

  <span>© 2026 Mini Forum</span>
  <div class="footer-links">
    <a href="/privacy-policy.html">Privacy & Cookies</a>
    <a href="mailto:your@email.com">Contact</a>
  </div>
</footer>
<script src="js/map-panel.js"></script>
<script src="js/dm.js"></script>
</body>
</html>
