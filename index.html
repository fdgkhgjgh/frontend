    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css" id="theme-stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>


    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

<body>
    <header>
        <h1>Miniless 物语</h1>
        <nav>
            <button id="theme-toggle">&#127769;/&#127762;模式</button>
            <a href="register.html">注册账号(Register)</a>
            <a href="login.html">登录(Login)</a>
            <button id="logout-button" style="display: none;">Logout</button>
        </nav>
    </header>
    <main id="post-list" class="main-post-list">
        <!-- Posts will be dynamically inserted here -->
  </main>
    <!-- Pagination container will be inserted here by js -->
    <section id="create-post-section">
        <h2>创建新帖子(Create New Post)</h2>
         <!-- Map Toggle Button -->
<div style="text-align: center; margin: 16px 0;">
    <button id="map-toggle-btn" onclick="toggleMapPanel()" style="
        background: #4f46e5;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 20px;
        font-size: 1rem;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    ">🗺️家庭地图 Family Map</button>
</div>

<!-- Map Panel (hidden by default) -->
<div id="map-panel" style="
    display: none;
    flex-direction: column;
    gap: 0;
    margin: 0 8px 16px 8px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
">
    <!-- Map -->
    <div style="position: relative;">
        <div id="map-container" style="width: 100%; height: 350px;"></div>
        <!-- Share location button overlaid on map -->
        <button id="share-location-btn" onclick="toggleLocationSharing()" style="
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: #4f46e5;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        ">📍分享我的位置Share My Location</button>
        <button id="toggle-tracks-btn" onclick="toggleTracks()" style="
    position: absolute;
    bottom: 12px;
    left: 10px;
    z-index: 1000;
    background: #2d7d46;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
">轨迹Tracks</button>
    </div>

    <!-- Chat Panel -->
    <div style="
        background: #f9f9f9;
        border-top: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        height: 220px;
    ">
        <div style="padding: 8px 12px; font-weight: bold; font-size: 0.85rem; border-bottom: 1px solid #eee; background: #fff;">
            👥群聊天
        </div>
        <div id="chat-messages" style="
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            font-size: 0.85rem;
        "></div>
        <div style="
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            border-top: 1px solid #eee;
            background: #fff;
        ">
            <button onclick="sendChatMessage()" style="
    background: #4f46e5;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85rem;
    flex-shrink: 0;
">发送</button>
<input id="chat-input" type="text" placeholder="Type a message..." 
    onkeydown="if(event.key==='Enter') sendChatMessage()"
    style="
        flex: 1;
        padding: 6px 10px;
        border: 1px solid #ddd;
        border-radius: 20px;
        font-size: 0.85rem;
        outline: none;
        min-width: 0;
    "/>
        </div>
    </div>
</div>

<!-- Map Panel Script -->
<script src="js/map-panel.js"></script>
        <form id="create-post-form-main">
            <label for="title-main">标题:</label>
            <input type="text" id="title-main" name="title" required><br><br>
    
            <label for="content-main">描述:</label>
            <textarea id="content-main" name="content" rows="4"></textarea><br><br>
    
            <!--  REPLACE THIS LINE -->
            <!-- <label for="image-main">Image (optional):</label>
            <input type="file" id="image-main" name="image" accept="image/*"><br><br> -->
    
            <!-- WITH THIS -->
            <label for="file-main">照片或视频(可多选):</label>
            <input type="file" id="file-main" name="files" accept="image/*, video/*" multiple><br><br>
    
            <button type="submit" id="create-post-button">
                发送新帖子(Send New Post)
                <span id="button-spinner" style="display: none;">
                    <!-- You can use a simple Unicode spinner or an SVG here -->
                    &#x21bb; <!-- Example: Unicode anticlockwise circled arrow -->
                </span>
                <span id="button-success-icon" style="display: none;">
                    &#x2713;  <!-- Example: Unicode checkmark -->
                </span>
            </button>
        </form>
        <p id="create-post-message-main"></p>
    </section>
    <!-- 1. config.js (for API_BASE_URL) -->
    <script src="js/config.js" type="module"></script>
    <!-- 2. utils.js (for formatDate, or other utilities) -->
    <script src="js/utils.js" type="module"></script>
    <!-- 3. auth.js (for checkLoginStatus, login, register, logout) -->
    <script src="js/auth.js" type="module"></script>
    <!-- 4. app.js (for main application logic, depends on auth.js)-->
    <script src="js/app.js" type="module"></script>
     <!-- 5. theme-toggle.js (can be anywhere, but usually best after main logic) -->
    <script src="js/theme-toggle.js" type="module"></script>
